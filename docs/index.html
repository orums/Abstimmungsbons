<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abstimmung Scanner</title>
  <!-- version: 1.1.0 -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ja:   #22c55e;
      --nein: #ef4444;
      --enth: #f59e0b;
      --bg:   #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      gap: 1rem;
    }

    h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: .03em; }

    /* ── Camera ── */
    #scanner-wrap {
      width: 100%;
      max-width: 480px;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid var(--border);
      background: #000;
    }
    #scanner-wrap video { width: 100%; display: block; }

    /* Aim overlay changes shape depending on mode */
    #aim {
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255,255,255,.6);
      border-radius: 6px;
      pointer-events: none;
      transition: width .25s, aspect-ratio .25s;
    }
    #aim.mode-qr      { width: 52%; aspect-ratio: 1/1; }
    #aim.mode-code128 { width: 80%; aspect-ratio: 4/1; }

    #scan-flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity .1s;
    }
    #scan-flash.flash { opacity: .35; }

    /* ── Status pill ── */
    #status {
      font-size: .85rem;
      padding: .3rem .9rem;
      border-radius: 99px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      text-align: center;
    }
    #status.ok    { color: var(--ja);   border-color: var(--ja); }
    #status.dup   { color: var(--enth); border-color: var(--enth); }
    #status.error { color: var(--nein); border-color: var(--nein); }

    /* ── Format toggle ── */
    #format-toggle {
      display: flex;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 3px;
      gap: 3px;
    }
    #format-toggle button {
      flex: 1;
      padding: .45rem 1.1rem;
      border-radius: 7px;
      border: none;
      font-size: .9rem;
      font-weight: 600;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    #format-toggle button.active {
      background: #3b82f6;
      color: #fff;
    }

    /* ── Action buttons ── */
    .btn-row {
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      cursor: pointer;
      padding: .55rem 1.3rem;
      border-radius: 8px;
      border: none;
      font-size: .95rem;
      font-weight: 600;
    }
    #btn-report { background: #3b82f6; color: #fff; }
    #btn-reset  { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
    button:active { opacity: .8; }

    /* ── Live tally ── */
    #tally-wrap { width: 100%; max-width: 600px; }
    #tally-wrap h2 { font-size: 1rem; color: var(--muted); margin-bottom: .5rem; }
    #tally-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .85rem;
    }
    #tally-table th, #tally-table td {
      padding: .45rem .6rem;
      text-align: right;
      border-bottom: 1px solid var(--border);
    }
    #tally-table th:first-child,
    #tally-table td:first-child { text-align: left; }
    #tally-table thead th { color: var(--muted); font-weight: 600; font-size: .8rem; }
    #tally-table .col-ja   { color: var(--ja); }
    #tally-table .col-nein { color: var(--nein); }
    #tally-table .col-enth { color: var(--enth); }
    #tally-table tfoot td  { font-weight: 700; border-top: 2px solid var(--border); }
    #tally-table .zero     { color: var(--border); }

    /* ── Report modal ── */
    #report-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 50;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 1rem;
    }
    #report-overlay.open { display: flex; }
    #report-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      width: 100%;
      max-width: 640px;
      margin: auto;
    }
    #report-box h2 { margin-bottom: 1rem; }
    #report-box table {
      width: 100%;
      border-collapse: collapse;
      font-size: .85rem;
      margin-bottom: 1.2rem;
    }
    #report-box th, #report-box td {
      padding: .5rem .6rem;
      text-align: right;
      border-bottom: 1px solid var(--border);
    }
    #report-box th:first-child,
    #report-box td:first-child { text-align: left; }
    #report-box thead th { color: var(--muted); font-size: .8rem; }
    #report-box tfoot td { font-weight: 700; border-top: 2px solid var(--border); }
    #report-box .col-ja   { color: var(--ja); }
    #report-box .col-nein { color: var(--nein); }
    #report-box .col-enth { color: var(--enth); }
    .report-btn-row {
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    #btn-print { background: #3b82f6; color: #fff; padding: .5rem 1.2rem; border-radius: 8px; font-weight: 600; }
    #btn-close { background: var(--card); color: var(--muted); border: 1px solid var(--border); padding: .5rem 1.2rem; border-radius: 8px; font-weight: 600; }

    /* ── Scan log ── */
    #log-wrap { width: 100%; max-width: 600px; }
    #log-wrap h2 { font-size: 1rem; color: var(--muted); margin-bottom: .5rem; }
    #log { list-style: none; font-size: .8rem; max-height: 160px; overflow-y: auto; }
    #log li {
      display: flex;
      justify-content: space-between;
      padding: .25rem .4rem;
      border-bottom: 1px solid var(--border);
      gap: .5rem;
    }
    #log li span.code { font-family: monospace; }
    #log li span.badge {
      padding: .1rem .5rem;
      border-radius: 99px;
      font-size: .75rem;
      font-weight: 700;
    }
    .badge-J   { background: #14532d; color: var(--ja); }
    .badge-N   { background: #450a0a; color: var(--nein); }
    .badge-E   { background: #451a03; color: var(--enth); }
    .badge-DUP { background: #1e293b; color: var(--muted); }

    @media print {
      body > *:not(#report-overlay) { display: none !important; }
      #report-overlay { display: block !important; position: static; background: none; padding: 0; }
      #report-box { border: none; padding: 0; }
      .report-btn-row { display: none !important; }
    }
  </style>
</head>
<body>

<h1>Abstimmung Scanner</h1>

<div id="scanner-wrap">
  <video id="video" playsinline muted></video>
  <div id="aim" class="mode-qr"></div>
  <div id="scan-flash"></div>
</div>

<div id="status">Kamera wird gestartet…</div>

<!-- Format toggle -->
<div id="format-toggle">
  <button id="btn-qr" class="active">QR Code</button>
  <button id="btn-128">Code 128</button>
</div>

<!-- Action buttons -->
<div class="btn-row">
  <button id="btn-report">Bericht anzeigen</button>
  <button id="btn-reset">Zurücksetzen</button>
</div>

<!-- Live tally -->
<div id="tally-wrap">
  <h2>Laufende Auswertung (Stimmen / Aktien)</h2>
  <table id="tally-table">
    <thead>
      <tr>
        <th>Abstimmung</th>
        <th class="col-ja">JA</th>
        <th class="col-ja">JA Akt.</th>
        <th class="col-nein">NEIN</th>
        <th class="col-nein">NEIN Akt.</th>
        <th class="col-enth">ENTH</th>
        <th class="col-enth">ENTH Akt.</th>
      </tr>
    </thead>
    <tbody id="tally-body"></tbody>
    <tfoot id="tally-foot"></tfoot>
  </table>
</div>

<!-- Scan log -->
<div id="log-wrap">
  <h2>Scan-Protokoll</h2>
  <ul id="log"></ul>
</div>

<!-- Report modal -->
<div id="report-overlay">
  <div id="report-box">
    <h2>Abstimmungsbericht</h2>
    <div id="report-content"></div>
    <div class="report-btn-row">
      <button id="btn-print">Drucken / PDF</button>
      <button id="btn-close">Schliessen</button>
    </div>
  </div>
</div>

<!-- ZXing barcode library -->
<script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
const scanned = new Set();
const votes   = {};
let   scanFormat = 'QR'; // 'QR' | 'CODE128'

// ── Barcode parsing ────────────────────────────────────────────────────────
const BARCODE_RE = /^(\d+)([JNE])(\d{3})\.(\d{3})$/;

function parse(raw) {
  const m = raw.match(BARCODE_RE);
  if (!m) return null;
  return {
    raw,
    voteNr: parseInt(m[1], 10),
    type:   m[2],
    shNr:   parseInt(m[3], 10),
    shares: parseInt(m[4], 10),
  };
}

function record({ voteNr, type, shares }) {
  if (!votes[voteNr]) {
    votes[voteNr] = {
      J: { count: 0, shares: 0 },
      N: { count: 0, shares: 0 },
      E: { count: 0, shares: 0 },
    };
  }
  votes[voteNr][type].count++;
  votes[voteNr][type].shares += shares;
}

// ── UI helpers ─────────────────────────────────────────────────────────────
const statusEl  = document.getElementById('status');
const tallyBody = document.getElementById('tally-body');
const tallyFoot = document.getElementById('tally-foot');
const logEl     = document.getElementById('log');
const flash     = document.getElementById('scan-flash');
const aim       = document.getElementById('aim');

const LABEL = { J: 'JA', N: 'NEIN', E: 'ENTH' };
const BADGE = { J: 'badge-J', N: 'badge-N', E: 'badge-E' };

function setStatus(msg, cls = '') {
  statusEl.className = cls;
  statusEl.textContent = msg;
}

function triggerFlash() {
  flash.classList.add('flash');
  setTimeout(() => flash.classList.remove('flash'), 150);
}

function addLog(parsed, isDup) {
  const li = document.createElement('li');
  li.innerHTML = `
    <span class="code">${parsed.raw}</span>
    <span>Abst.&nbsp;${parsed.voteNr} &bull; Akt.&nbsp;${parsed.shares}</span>
    <span class="badge ${isDup ? 'badge-DUP' : BADGE[parsed.type]}">${isDup ? 'DUP' : LABEL[parsed.type]}</span>`;
  logEl.prepend(li);
}

function renderTally() {
  const rounds = Object.keys(votes).map(Number).sort((a, b) => a - b);
  const totals = { J:{count:0,shares:0}, N:{count:0,shares:0}, E:{count:0,shares:0} };

  tallyBody.innerHTML = rounds.map(nr => {
    const r = votes[nr];
    ['J','N','E'].forEach(t => { totals[t].count += r[t].count; totals[t].shares += r[t].shares; });
    return `<tr>
      <td><strong>Abst.&nbsp;${nr}</strong></td>
      <td class="col-ja${r.J.count?'':' zero'}">${r.J.count}</td>
      <td class="col-ja${r.J.count?'':' zero'}">${r.J.shares}</td>
      <td class="col-nein${r.N.count?'':' zero'}">${r.N.count}</td>
      <td class="col-nein${r.N.count?'':' zero'}">${r.N.shares}</td>
      <td class="col-enth${r.E.count?'':' zero'}">${r.E.count}</td>
      <td class="col-enth${r.E.count?'':' zero'}">${r.E.shares}</td>
    </tr>`;
  }).join('');

  if (!rounds.length) { tallyFoot.innerHTML = ''; return; }
  tallyFoot.innerHTML = `<tr>
    <td>Total</td>
    <td class="col-ja">${totals.J.count}</td><td class="col-ja">${totals.J.shares}</td>
    <td class="col-nein">${totals.N.count}</td><td class="col-nein">${totals.N.shares}</td>
    <td class="col-enth">${totals.E.count}</td><td class="col-enth">${totals.E.shares}</td>
  </tr>`;
}

// ── Report ─────────────────────────────────────────────────────────────────
function buildReport() {
  const rounds = Object.keys(votes).map(Number).sort((a, b) => a - b);
  const totals = { J:{count:0,shares:0}, N:{count:0,shares:0}, E:{count:0,shares:0} };

  const rows = rounds.map(nr => {
    const r = votes[nr];
    ['J','N','E'].forEach(t => { totals[t].count += r[t].count; totals[t].shares += r[t].shares; });
    const tot = r.J.count + r.N.count + r.E.count;
    const totS = r.J.shares + r.N.shares + r.E.shares;
    return `<tr>
      <td><strong>Abstimmung&nbsp;${nr}</strong></td>
      <td class="col-ja">${r.J.count}</td><td class="col-ja">${r.J.shares}</td>
      <td class="col-nein">${r.N.count}</td><td class="col-nein">${r.N.shares}</td>
      <td class="col-enth">${r.E.count}</td><td class="col-enth">${r.E.shares}</td>
      <td>${tot}</td><td>${totS}</td>
    </tr>`;
  }).join('');

  const now = new Date().toLocaleString('de-CH');
  const totalAll = totals.J.count + totals.N.count + totals.E.count;
  const sharesAll = totals.J.shares + totals.N.shares + totals.E.shares;

  document.getElementById('report-content').innerHTML = `
    <p style="color:var(--muted);font-size:.8rem;margin-bottom:.8rem">Erstellt: ${now} &bull; ${scanned.size} gescannte Zettel</p>
    <table>
      <thead>
        <tr>
          <th>Abstimmung</th>
          <th class="col-ja">JA</th><th class="col-ja">JA&nbsp;Akt.</th>
          <th class="col-nein">NEIN</th><th class="col-nein">NEIN&nbsp;Akt.</th>
          <th class="col-enth">ENTH</th><th class="col-enth">ENTH&nbsp;Akt.</th>
          <th>Total</th><th>Akt.&nbsp;Total</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr>
          <td>Total</td>
          <td class="col-ja">${totals.J.count}</td><td class="col-ja">${totals.J.shares}</td>
          <td class="col-nein">${totals.N.count}</td><td class="col-nein">${totals.N.shares}</td>
          <td class="col-enth">${totals.E.count}</td><td class="col-enth">${totals.E.shares}</td>
          <td>${totalAll}</td><td>${sharesAll}</td>
        </tr>
      </tfoot>
    </table>`;
}

// ── Camera / ZXing ─────────────────────────────────────────────────────────
const video = document.getElementById('video');
let codeReader   = null;
let rearDeviceId = null;  // fixed to rear camera after init

function buildHints(format) {
  const hints = new Map();
  hints.set(
    ZXing.DecodeHintType.POSSIBLE_FORMATS,
    format === 'QR'
      ? [ZXing.BarcodeFormat.QR_CODE]
      : [ZXing.BarcodeFormat.CODE_128]
  );
  return hints;
}

function onResult(result) {
  if (!result) return;
  const raw    = result.getText();
  const parsed = parse(raw);
  if (!parsed) { setStatus(`Unbekanntes Format: ${raw}`, 'error'); return; }
  if (scanned.has(raw)) {
    setStatus(`Bereits gescannt: ${raw}`, 'dup');
    addLog(parsed, true);
    triggerFlash();
    return;
  }
  scanned.add(raw);
  record(parsed);
  renderTally();
  addLog(parsed, false);
  triggerFlash();
  setStatus(`✓ ${LABEL[parsed.type]} — Abst. ${parsed.voteNr} | Aktien: ${parsed.shares}`, 'ok');
  if (navigator.vibrate) navigator.vibrate(40);
}

async function startScanner(format) {
  if (codeReader) { try { codeReader.reset(); } catch (_) {} }
  codeReader = new ZXing.BrowserMultiFormatReader(buildHints(format));
  setStatus('Kamera wird gestartet…');
  try {
    await codeReader.decodeFromVideoDevice(rearDeviceId, video, (result) => {
      if (result) onResult(result);
    });
    setStatus('Bereit zum Scannen…');
  } catch (e) {
    setStatus('Kamera-Fehler: ' + e.message, 'error');
  }
}

async function initCamera() {
  if (!navigator.mediaDevices?.getUserMedia) {
    setStatus('Kamera nicht unterstützt (HTTPS erforderlich)', 'error');
    return;
  }
  setStatus('Bitte Kamerazugriff erlauben…');
  try {
    // Trigger permission dialog, prefer rear camera
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } },
    });
    stream.getTracks().forEach(t => t.stop());

    // Enumerate devices to find the rear camera by label
    const tempReader = new ZXing.BrowserMultiFormatReader();
    const devices    = await tempReader.listVideoInputDevices();
    const rear       = devices.find(d => /back|rear|environment/i.test(d.label));
    rearDeviceId     = rear ? rear.deviceId : (devices[0]?.deviceId ?? null);

    await startScanner(scanFormat);
  } catch (e) {
    if (e.name === 'NotAllowedError') {
      setStatus('Kamerazugriff verweigert — bitte in den Browser-Einstellungen erlauben', 'error');
    } else if (e.name === 'NotFoundError') {
      setStatus('Keine Kamera gefunden', 'error');
    } else {
      setStatus('Kamera-Fehler: ' + e.message, 'error');
    }
  }
}

// ── Format toggle ──────────────────────────────────────────────────────────
function setFormat(format) {
  scanFormat = format;
  document.getElementById('btn-qr').classList.toggle('active', format === 'QR');
  document.getElementById('btn-128').classList.toggle('active', format === 'CODE128');
  aim.className = format === 'QR' ? 'mode-qr' : 'mode-code128';
  if (rearDeviceId !== null) startScanner(format);
}

document.getElementById('btn-qr').addEventListener('click',  () => setFormat('QR'));
document.getElementById('btn-128').addEventListener('click', () => setFormat('CODE128'));

// ── Action buttons ─────────────────────────────────────────────────────────
document.getElementById('btn-report').addEventListener('click', () => {
  buildReport();
  document.getElementById('report-overlay').classList.add('open');
});
document.getElementById('btn-close').addEventListener('click', () => {
  document.getElementById('report-overlay').classList.remove('open');
});
document.getElementById('btn-print').addEventListener('click', () => window.print());
document.getElementById('btn-reset').addEventListener('click', () => {
  if (!confirm('Alle Scandaten löschen?')) return;
  scanned.clear();
  for (const k in votes) delete votes[k];
  logEl.innerHTML = '';
  renderTally();
  setStatus('Zurückgesetzt. Bereit zum Scannen…');
});

// ── Init ───────────────────────────────────────────────────────────────────
initCamera();
renderTally();
</script>
</body>
</html>
